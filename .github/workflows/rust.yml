name: Rust Core CI

on:
  push:
    paths:
      - 'simple-comic-core/**'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'simple-comic-core/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14]  # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            simple-comic-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('simple-comic-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt check
        working-directory: simple-comic-core
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: simple-comic-core
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        working-directory: simple-comic-core
        run: cargo test --workspace

      - name: Build static lib (arm64)
        working-directory: simple-comic-core
        run: cargo build --release --package sc-ffi --target aarch64-apple-darwin

      - name: Build static lib (x86_64)
        working-directory: simple-comic-core
        run: cargo build --release --package sc-ffi --target x86_64-apple-darwin

      - name: Create universal static lib
        working-directory: simple-comic-core
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/libsimplecomic.a \
            target/x86_64-apple-darwin/release/libsimplecomic.a \
            -output target/libsimplecomic-universal.a
          echo "Universal lib size: $(du -h target/libsimplecomic-universal.a | cut -f1)"
